<ion-header>
  <ion-toolbar>
    <ion-title>Movie App</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-button routerLink="/favourites">Go to Favourites</ion-button>

  <ion-list>
    @for (movie of movies; track movie.id) {
      <ion-item [routerLink]="['/details', movie.id]">
        <ion-label>{{ movie.title }}</ion-label>
      </ion-item>
    }
  </ion-list>
</ion-content>
