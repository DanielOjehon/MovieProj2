<ion-header>
  <ion-toolbar>
    <ion-title>Movie App</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-button routerLink="/favourites">
    Go to Favourites
  </ion-button>

  <ion-list>
    <ion-item *ngFor="let movie of movies" (click)="openDetails(movie)">
      {{ movie.title }}
    </ion-item>
  </ion-list>

</ion-content>
